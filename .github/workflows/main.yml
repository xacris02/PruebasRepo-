name: Spring Boot CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests with JaCoCo
    runs-on: ubuntu-latest
    
    steps:
      # Paso 1: Checkout del repositorio
      - name: Checkout code
        uses: actions/checkout@v4
        
      # Paso 2: Configurar JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      # Paso 3: Cache de dependencias de Maven
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2
            
      # Paso 4: Construir el proyecto y ejecutar tests
      - name: Build and test
        run: mvn clean verify
        
      # Paso 5: Publicar reporte de cobertura de JaCoCo
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  build:
    name: Build Jar
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      # Paso 1: Checkout del repositorio
      - name: Checkout code
        uses: actions/checkout@v4
        
      # Paso 2: Configurar JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      # Paso 3: Construir el artefacto JAR
      - name: Package application
        run: mvn clean package -DskipTests
        
      # Paso 4: Subir artefacto JAR
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
