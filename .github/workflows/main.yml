name: CI/CD Pipeline SmokeGames

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove broken Maven Wrapper
        run: rm -f SmokeGameBack/mvnw SmokeGameBack/mvnw.cmd
      - name: Snyk Security Scan
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=SmokeGameBack/pom.xml --severity-threshold=high

  build-and-test:
    name: Run Tests with JaCoCo
    needs: security-scan
    runs-on: ubuntu-latest
    
    # SOLUCIÓN: Agregamos el MySQL temporal para que el test pase
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: smoke_game_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Build and Test with JaCoCo
        working-directory: ./SmokeGameBack
        # Inyectamos las credenciales para que Spring Boot se conecte
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/smoke_game_db?useSSL=false&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: rootpassword
        run: mvn clean verify -Dspring.profiles.active=test
        
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: SmokeGameBack/target/site/jacoco/

  docker-deploy:
    name: Build & Deploy Docker
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t smokegames-back ./SmokeGameBack
      - name: Deploy with Docker Compose
        run: docker-compose up -d
